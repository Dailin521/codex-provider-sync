name: Desktop 历史会话不显示
description: CLI 能看到，但 Codex Desktop 项目侧显示“暂无对话”或历史会话缺失时使用
title: "desktop: "
labels:
  - upstream-desktop
  - needs-info
body:
  - type: markdown
    attributes:
      value: |
        这类问题经常和 Codex Desktop 自身的项目筛选、分页加载、cwd 路径匹配或 SQLite 状态有关。请完整提供诊断文本，不要只贴“暂无对话”截图。
  - type: input
    id: version
    attributes:
      label: codex-provider-sync 版本
      placeholder: v0.2.4
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 系统版本
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: 当前 provider
      description: 填写你希望 Desktop 当前显示历史会话的 provider，例如 openai / dal / apigather。
      placeholder: dal
    validations:
      required: true
  - type: input
    id: project_path
    attributes:
      label: 不显示历史的项目路径
      placeholder: D:\GitHubProject\oss-maintainer-hub
    validations:
      required: true
  - type: dropdown
    id: cli_visible
    attributes:
      label: CLI 是否能看到这些历史会话
      options:
        - 是，codex resume 能看到
        - 否，CLI 也看不到
        - 不确定
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: status / GUI Refresh 完整诊断文本
      description: 必填。需要包含 Current provider、Rollout files、SQLite state、Project visibility diagnostics。
      render: text
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Desktop 截图或现象说明
      description: 可贴项目侧“暂无对话”、Recent、CLI resume 的截图。
    validations:
      required: false
  - type: textarea
    id: sync_steps
    attributes:
      label: 你执行过的同步步骤
      placeholder: |
        1. 关闭 Codex Desktop
        2. 切换 provider 到 ...
        3. 运行 sync / switch ...
        4. 重启 Desktop 后 ...
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: 确认事项
      options:
        - label: 我理解 CLI 可见但 Desktop 不显示时，可能是 Codex Desktop 上游显示逻辑问题。
          required: true
        - label: 我理解本工具不会修改 updated_at，也不会通过改变排序来让旧会话进入前排。
          required: true
